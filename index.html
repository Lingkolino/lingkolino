<img src="logo.png.png" alt="Logo"> <!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lingko Lino Properti</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}
body{background:#020617;color:#e5e7eb}

/* NAV */
nav{position:fixed;width:100%;top:0;background:#000;padding:15px;text-align:center;z-index:1000}
nav a{color:#facc15;margin:0 15px;text-decoration:none;font-weight:bold}

/* HERO */
.hero{
height:100vh;display:flex;flex-direction:column;
justify-content:center;align-items:center;text-align:center;
background:linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.9)),
url('https://images.unsplash.com/photo-1560185127-6ed189bf02f4');
background-size:cover;
}
.hero img{width:130px;filter:drop-shadow(0 0 10px gold)}
.hero h1{font-size:45px}
.hero p{color:#facc15}

.btn{padding:10px 20px;background:#facc15;color:#000;border-radius:8px;text-decoration:none}

/* SECTION */
.section{padding:80px 20px;max-width:1100px;margin:auto}
.section h2{color:#facc15}

/* GRID */
.grid{display:flex;flex-wrap:wrap;gap:20px;justify-content:center}
.card{background:#111827;padding:15px;border-radius:10px;width:280px}
.card img{width:100%;border-radius:10px}

/* FORM */
input,textarea{
width:90%;padding:10px;margin:5px;border-radius:8px;border:none
}

/* MAP */
iframe{width:100%;height:300px;border-radius:10px;margin-top:10px}

footer{text-align:center;padding:20px;background:#000}
</style>
</head>

<body>

<nav>
<a href="#home">Home</a>
<a href="#input">Input</a>
<a href="#properti">Properti</a>
<a href="#kontak">Kontak</a>
</nav>

<!-- HERO -->
<section class="hero" id="home">
<img src="logo.png">
<h1>Lingko Lino Properti</h1>
<p>Trusted Property Solutions</p>
</section>

<!-- INPUT PROPERTI -->
<section class="section" id="input">
<h2>Tambah Properti</h2>

<input id="nama" placeholder="Nama Properti">
<input id="harga" placeholder="Harga">
<input id="img" placeholder="Link Gambar">
<input id="maps" placeholder="Link Google Maps">
<textarea id="desk" placeholder="Deskripsi"></textarea>

<button onclick="tambah()" class="btn">Simpan</button>
</section>

<!-- LISTING -->
<section class="section" id="properti">
<h2>Listing Properti</h2>
<div class="grid" id="list"></div>
</section>

<!-- KONTAK -->
<section class="section" id="kontak">
<h2>Kontak</h2>
<p>☎ 087760664055</p>
<p>📧 lingkolinoproperty@gmail.com</p>
<a href="https://wa.me/6287760664055" class="btn">Chat WA</a>
</section>

<footer>
<p>© 2026 Lingko Lino Properti</p>
</footer>

<script>
let data = JSON.parse(localStorage.getItem('properti')) || [];

function render(){
const list = document.getElementById('list');
list.innerHTML = '';

data.forEach(item => {
list.innerHTML += `
<div class="card">
<img src="${item.img}">
<h3>${item.nama}</h3>
<p>${item.harga}</p>
<p>${item.desk}</p>

<a href="${item.maps}" target="_blank" class="btn">Lihat Lokasi</a>
<a href="https://wa.me/6287760664055" class="btn">Minat</a>

<iframe src="${item.maps.replace('https://www.google.com/maps','https://www.google.com/maps/embed')}" loading="lazy"></iframe>
</div>
`;
});
}

function tambah(){
const item = {
nama: document.getElementById('nama').value,
harga: document.getElementById('harga').value,
img: document.getElementById('img').value,
maps: document.getElementById('maps').value,
desk: document.getElementById('desk').value
};

data.push(item);
localStorage.setItem('properti', JSON.stringify(data));
render();
}

render();
</script>

</body>
</html>
